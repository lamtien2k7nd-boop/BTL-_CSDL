<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="login_style.css">
</head>
<body>
    <div class="bg"></div>
    
    <div class="container">
        <div class="login">
            
            <div class="method">
                <div class="google">
                    <img src="/Giao dien khach hang/resources/Google-icon-design-in-black-color-on-transparent-PNG.png" alt="Google icon">
                    </div>
                <div class="facebook">
                    <img src="/Giao dien khach hang/resources/round-circle-black-and-white-facebook-logo-on-a-transparent-background-free-png.png" alt="Facebook icon">
                    </div>
            </div>

            <div class="divider">
                <div class="line"></div>
                <span class="text">Hoặc</span>
                <div class="line"></div>
            </div>

            <div class="form">
                <p>Đăng nhập bằng tài khoản và mật khẩu</p>
                <form action="" class="login-form">
                    <input type="text" placeholder="Tên đăng nhập hoặc Email">
                    <input type="password" placeholder="Mật khẩu">
                    <button type="submit">Đăng nhập</button>
                </form>
            </div>

        </div>
    </div>
</body>
</html>
