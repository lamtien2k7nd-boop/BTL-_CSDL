<body>
    <div class = "sidebar">
        <h2>Quản lý cửa hàng</h2>

        <h1>Nhập hàng</h1>

                <button type = "submit" class="xanh">Tìm kiếm</button>
                <button type = "reset" class="xam">Xóa</button>
            </form>
        </div>
        <button class="xanhla" style = "margin-bottom: 5px;">+Thêm phiếu nhập mới</button>
        <div class="main">
            <div class="header-row">
                <div>Mã phiếu nhập</div>

                <div>Nhà cung cấp</div>
                <div>Tổng tiền</div>

            </div>
            <div class="data-row">
                <div>PN01</div>
                <div>2024-06-01</div>
                <div>NCC01</div>
                <div>5.000.000đ</div>
                <div class="action">
                    <button class = "btn_tim">Chi tiết</button>
                    <button class = "btn_cam">Sửa</button>
                    <button class = "btn_do">Xóa</button>
                </div>
            </div>
            <div class="data-row">
                <div>PN02</div>
                <div>2024-06-05</div>
                <div>NCC02</div>
                <div>3.000.000đ</div>
                <div class="action">
                    <button id="btn" class = "btn_tim">Chi tiết</button>
                    <button id="btn" class = "btn_cam">Sửa</button>
                    <button id="btn" class = "btn_do">Xóa</button>
                </div>
            </div>
        </div>
    </div>
